version = 1

[[rules]]
matcher = "File"
regex = '\.env$'
message = "Access to .env files is prohibited. Ask the user to check or provide the values you need."

[[rules]]
matcher = "Bash"
regex = '\brm\b'
message = "Use of 'rm' is prohibited. Use trash-put [file|directory] instead."

[[rules]]
matcher = "Bash"
regex = '\brmdir\b'
message = "Use of 'rmdir' is prohibited. Use trash-put [file|directory] instead."

[[rules]]
matcher = "Bash"
regex = '\bnpm\b'
message = "Use of 'npm' is prohibited. Use pnpm instead."

[[rules]]
matcher = "Bash"
regex = '\bpip\b'
message = "Use of 'pip' is prohibited. Use uv pip instead."
